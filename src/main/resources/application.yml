spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sogang_ribbon?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

notion:
  api-key: ${NOTION_API_KEY:}
  database-id: ${NOTION_DATABASE_ID:}
